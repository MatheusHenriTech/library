{% extends "myapp/base.html" %}

{% block content %}
 
<div class="container mx-auto">
    <div class="text-center mt-5">
        <h1>
             Sign-up<i class="bi bi-person-circle ms-2"></i>
        </h1>
    </div>

    {% for message in messages %}
        {% if 'username_alert' in message.tags %}
            <div class="alert alert-danger  mx-auto col-4 text-center mt-4" role="alert">
                {{ message }}
            </div>
        {% endif %}    
    {% endfor %}


    <form action="{% url "register" %}" method="post" class="mx-auto w-25" style="margin-top: 40px">
        {% csrf_token %}
        <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">Username</label>
            <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Username..." name="username">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="email" required>
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Password</label>
            <input type="password" class="form-control" id="password1" placeholder="Password..." name="password1">
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label" name="password2">Confirm your password</label>
            <input type="password" class="form-control" id="password2" placeholder="Password..." name="password2">
        </div>
        <button type="submit" class="btn btn-primary mt-2">Create</button>
        <p class="mt-3">Already have an account? <a href="{% url "login" %}" class="ms-1 text-decoration-none">Enter now</a></p> 
    </form>
</div>

    

{% endblock content %}
