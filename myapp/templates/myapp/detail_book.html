{% extends "myapp/base.html" %}

{% block content %}
    <div class="container mx-auto">
        <h1 class="text-center mt-4">Details book</h1>
        <div class="col-md-6 mx-auto mt-4">
            {% if book.cover %}
                <img src="{{ book.cover.url }}" alt="{{ book.title }}" style="width: 140px; height: 140px;">
            {% else %}
                <p>No cover here</p>
            {% endif %}

            <div class="mb-3 mt-2">
                <label class="form-label">Book title</label>
                <div class="border rounded p-2 bg-light">{{ book.title }}</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Author</label>
                <div class="border rounded p-2 bg-light">{{ book.author }}</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <div class="border rounded p-2 bg-light" style="height:300px; overflow-wrap: break-word; overflow-y: auto;">{{ book.description }}</div>
            </div>

            <a href="{% url "home" %}" class="btn btn-secondary mt-3 w-" style="width: 80px;">Back</a>
                
        </div>
    </div>

{% endblock content %}
