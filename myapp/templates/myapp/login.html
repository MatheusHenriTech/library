{% extends "myapp/base.html" %}



{% block content %}
<style>
    a:hover {
        text-decoration: underline !important;
    }
</style>
<div class="container mx-auto">
    <div class="text-center mt-5">
        <h1>
             Login<i class="bi bi-person-circle ms-2"></i>
        </h1>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger  mx-auto col-4 text-center mt-4" role="alert">
                {{ message }}
            </div>        
        {% endfor %}
    {% endif %}

    <form action="{% url "login" %}" method="post" class="mx-auto w-25" style="margin-top: 40px">
        {% csrf_token %}
        <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">Username</label>
            <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Username..." name="username">
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Password</label>
            <input type="password" class="form-control" id="formGroupExampleInput2" placeholder="Password..." name="password">
        </div>
        <button type="submit" class="btn btn-primary mt-2">Login</button>
        <p class="mt-3">Don't have an account? <a href="{% url "register" %}" class="ms-1 text-decoration-none">Register now</a></p> 
    </form>
</div>


{% endblock content %}
